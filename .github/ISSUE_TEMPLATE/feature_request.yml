name: 功能建议
description: 提出一个新功能或改进建议
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你提出建议！请描述你的想法，帮助我们改进 Qclaw Lite。

  - type: textarea
    id: problem
    attributes:
      label: 问题或动机
      description: 这个建议要解决什么问题？或者你在使用中遇到了什么不便？
      placeholder: 我在配置渠道时经常需要...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 建议方案
      description: 描述你期望的功能或改进
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你是否考虑过其他替代方案？
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: 截图、参考链接或其他上下文
    validations:
      required: false
